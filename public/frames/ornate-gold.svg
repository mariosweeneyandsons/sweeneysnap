<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" fill="none">
  <defs>
    <mask id="ornate-inner">
      <rect width="1080" height="1080" fill="white"/>
      <rect x="30" y="30" width="1020" height="1020" fill="black"/>
    </mask>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="30%" stop-color="#F0D78C"/>
      <stop offset="50%" stop-color="#D4A843"/>
      <stop offset="70%" stop-color="#F0D78C"/>
      <stop offset="100%" stop-color="#D4A843"/>
    </linearGradient>
  </defs>
  <!-- Outer gold border -->
  <rect width="1080" height="1080" fill="url(#gold)" mask="url(#ornate-inner)"/>
  <!-- Inner line -->
  <rect x="22" y="22" width="1036" height="1036" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
  <!-- Decorative corner accents -->
  <g stroke="url(#gold)" stroke-width="2" fill="none">
    <!-- Top-left -->
    <path d="M10,40 Q10,10 40,10"/>
    <path d="M10,60 Q10,10 60,10"/>
    <!-- Top-right -->
    <path d="M1040,10 Q1070,10 1070,40"/>
    <path d="M1020,10 Q1070,10 1070,60"/>
    <!-- Bottom-left -->
    <path d="M10,1040 Q10,1070 40,1070"/>
    <path d="M10,1020 Q10,1070 60,1070"/>
    <!-- Bottom-right -->
    <path d="M1040,1070 Q1070,1070 1070,1040"/>
    <path d="M1020,1070 Q1070,1070 1070,1020"/>
  </g>
</svg>
